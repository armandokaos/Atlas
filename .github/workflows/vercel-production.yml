# Déploie sur Vercel à chaque push sur `main`.
#
# À configurer une fois dans le dépôt GitHub → Settings → Secrets and variables → Actions :
#   VERCEL_TOKEN        → https://vercel.com/account/tokens
#   VERCEL_ORG_ID       → Team / compte (dans Vercel → Project Settings → General)
#   VERCEL_PROJECT_ID   → idem
#
# Si le projet est déjà lié à GitHub dans le dashboard Vercel, tu peux avoir deux builds
# par push (intégration native + cette action) : dans ce cas, désactive l’une des deux.

name: Vercel production

on:
  push:
    branches:
      - main

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest deploy --prod --yes --no-color --token="$VERCEL_TOKEN"
